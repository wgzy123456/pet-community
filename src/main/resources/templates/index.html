<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪友 - 宠物主人社区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:#F7F8FA;color:#1A1A2E;min-height:100vh}
button{border:none;background:none;cursor:pointer;font-family:inherit}
.app{max-width:768px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#F7F8FA}
.hdr{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid #F0F0F5}
.logo{font-size:22px;font-weight:800;color:#FF6B35;display:flex;align-items:center;gap:6px}
.hdr-btn{background:none;border:none;cursor:pointer;color:#1A1A2E;font-size:20px;padding:4px}
.main{flex:1;padding-bottom:72px}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:768px;background:#fff;border-top:1px solid #F0F0F5;display:flex;z-index:100;padding:6px 0;padding-bottom:env(safe-area-inset-bottom,6px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#8A8A9A;background:none;border:none;padding:6px 0}
.tab.active{color:#FF6B35}
.tab svg{width:22px;height:22px}
.tab span{font-size:10px;font-weight:500}
.story-bar{background:#fff;padding:12px 16px;display:flex;gap:12px;overflow-x:auto;margin-bottom:8px}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;position:relative}
.story-ring{width:64px;height:64px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#FF6B35,#4ECDC4);display:flex;align-items:center;justify-content:center}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid #fff}
.story-ring.self{background:linear-gradient(135deg,#ccc,#aaa)}
.story-name{font-size:11px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed{padding:8px 16px;display:flex;flex-direction:column;gap:12px}
.post-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.post-header{display:flex;align-items:center;padding:14px 16px;gap:10px}
.post-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.post-author{flex:1}
.post-nickname{font-size:15px;font-weight:600}
.post-meta{font-size:12px;color:#8A8A9A;margin-top:2px}
.post-content{padding:0 16px 10px;font-size:15px;line-height:1.7}
.post-topic{display:inline-block;background:#FFF0EB;color:#FF6B35;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;margin:0 16px 8px}
.post-images{display:grid;gap:3px;padding:0 16px}
.post-images.img-1{grid-template-columns:1fr}.post-images.img-2{grid-template-columns:1fr 1fr}.post-images.img-3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
.post-images img{width:100%;object-fit:cover;cursor:pointer;border-radius:8px;display:block}
.post-images.img-1 img{height:300px}.post-images.img-2 img{height:180px}.post-images.img-3 img:first-child{grid-row:1/3;height:100%}.post-images.img-3 img:not(:first-child){height:calc((100% - 3px) / 2)}
.post-actions{padding:10px 16px;border-top:1px solid #F5F5F5;display:flex;gap:24px}
.post-action{display:flex;align-items:center;gap:5px;font-size:13px;color:#8A8A9A;cursor:pointer}
.post-action svg{width:20px;height:20px}
.post-action.liked{color:#FF4757}.post-action.liked svg{fill:#FF4757}
.post-comments{padding:10px 16px;border-top:1px solid #F5F5F5;display:none}
.post-comments.open{display:block}
.comment-item{font-size:13px;line-height:1.6;margin-bottom:5px}
.comment-author{color:#FF6B35;font-weight:600}
.discover{padding:16px}
.search-input{width:100%;border:1.5px solid #F0F0F5;border-radius:22px;padding:12px 18px;font-size:15px;outline:none;background:#fff;box-sizing:border-box;margin-bottom:16px}
.search-input:focus{border-color:#FF6B35}
.discover-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.discover-card{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.discover-card img{width:100%;height:120px;object-fit:cover}
.discover-card-body{padding:12px}
.discover-card-title{font-size:14px;font-weight:600}
.discover-card-desc{font-size:12px;color:#8A8A9A;margin-top:3px}
.discover-tag{display:inline-block;background:#FFF0EB;color:#FF6B35;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;margin-top:5px}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px}
.nearby-list{display:flex;flex-direction:column;gap:8px}
.nearby-card{background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nearby-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #FF6B35;flex-shrink:0}
.nearby-name{font-size:15px;font-weight:600}.nearby-desc{font-size:12px;color:#8A8A9A;margin-top:2px}
.nearby-distance{font-size:12px;color:#4ECDC4;font-weight:600;background:#E8FAF8;padding:3px 8px;border-radius:10px;flex-shrink:0}
.profile-header{background:linear-gradient(135deg,#FF6B35,#FF8C5A);color:#fff;padding:32px 20px 52px;position:relative}
.profile-edit-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer}
.profile-info{display:flex;align-items:center;gap:16px}
.profile-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.4);object-fit:cover;background:#fff;flex-shrink:0}
.profile-name{font-size:22px;font-weight:700}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.profile-tag{background:rgba(255,255,255,.2);font-size:12px;padding:2px 10px;border-radius:10px}
.profile-stats{display:flex;gap:28px;margin-top:20px}
.profile-stat-n{font-size:20px;font-weight:800}
.profile-stat-l{font-size:12px;opacity:.8;margin-top:2px}
.profile-card{background:#fff;margin:-36px 16px 0;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.1);position:relative;z-index:2}
.profile-section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.pets-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.pet-chip{min-width:90px;text-align:center;background:#FFF0EB;border-radius:14px;padding:14px 8px;cursor:pointer;flex-shrink:0}
.pet-chip-icon{font-size:32px}.pet-chip-name{font-size:13px;font-weight:600;margin-top:4px}.pet-chip-breed{font-size:11px;color:#8A8A9A;margin-top:2px}
.pet-chip-add{background:#FFF8F5}
.menu-section{padding:16px;display:flex;flex-direction:column;gap:8px}
.menu-item{display:flex;align-items:center;padding:14px 16px;background:#fff;border-radius:14px;cursor:pointer}
.menu-icon{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#FFF0EB;border-radius:10px;flex-shrink:0}
.menu-text{flex:1;font-size:15px;font-weight:500;margin-left:12px}
.menu-arrow{color:#C8C8D8;font-size:16px}
.post-page{padding:20px 16px}
.post-create-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.post-create-title{font-size:18px;font-weight:700;margin-bottom:16px}
.post-textarea{width:100%;border:1.5px solid #E8E8EE;border-radius:12px;padding:12px;font-size:15px;resize:none;min-height:140px;outline:none;font-family:inherit;line-height:1.7}
.post-textarea:focus{border-color:#FF6B35}
.post-tools{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.post-tool{background:#F5F5F8;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;color:#555}
.post-submit{width:100%;background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.auth-container{max-width:400px;margin:60px auto 0;padding:20px}
.auth-logo{text-align:center;margin-bottom:32px}.auth-logo span{font-size:56px}
.auth-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:8px}
.auth-sub{font-size:14px;color:#8A8A9A;text-align:center;margin-bottom:36px}
.auth-card{background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:#555;margin-bottom:6px;display:block}
.form-input{width:100%;border:1.5px solid #E8E8EE;border-radius:12px;padding:12px 16px;font-size:15px;outline:none;background:#fff;font-family:inherit}
.form-input:focus{border-color:#FF6B35}
.form-btn{width:100%;background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.form-link{text-align:center;margin-top:20px;font-size:14px;color:#8A8A9A}
.form-link a{color:#FF6B35;font-weight:600}
.image-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:none;align-items:center;justify-content:center}
.image-viewer.on{display:flex}
.image-viewer img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
.image-viewer-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;z-index:400;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.on{opacity:1}
.empty-state{text-align:center;padding:60px 20px;color:#8A8A9A}.empty-icon{font-size:64px;margin-bottom:16px}.empty-text{font-size:15px}
.image-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.image-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px}
</style>
</head>
<body>
<div class="app">
  <header class="hdr"><div class="logo"><span>🐾</span>爪友</div><button class="hdr-btn" onclick="toast('搜索功能开发中~')">🔍</button></header>
  <div id="main-content" class="main"></div>
  <nav class="tabbar" id="tabbar"></nav>
</div>
<div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
  <span class="image-viewer-close" onclick="closeImageViewer()">✕</span><img id="viewerImg" src="" alt="">
</div>
<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
