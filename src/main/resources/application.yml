server:
  port: 8080
  servlet:
    context-path:

spring:
  application:
    name: pet-community

  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

  # H2 开发数据库配置
  datasource:
    url: jdbc:h2:file:./data/petcommunity;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console（开发调试用，生产环境关闭）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Thymeleaf 配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 日志配置
logging:
  level:
    com.petcommunity: INFO
    org.springframework.web: INFO

# 图片上传目录
app:
  upload:
    dir: ./uploads
